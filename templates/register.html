<!DOCTYPE html>
<html>

  <head>
    <link rel="stylesheet" href="/static/main.css">
    <title>Rekisteröinti</title>
  </head>

  <body>

    <header class="form-header">
      <h1 class="form-title">Rekisteröinti</h1>
    </header>

    {% for message in get_flashed_messages() %}
      <span class="flash-message">
        <div class="form-flash-message">
          <em>
            {{ message }}
          </em>
        </div>
      </span>
    {% endfor %}

    <form class="registration-form" action="/register" method="post">
      <p>
        <label for="username">Tunnus:</label><br>
        <input type="text" name="username" value="{{ filled.username }}" maxlength="16" required/>
      </p>

      <p>
        <label for="password1">Salasana:</label><br>
        <input type="password" name="password1" required/>
      </p>

      <p>
        <label for="password2">Salasana uudestaan:</label><br>
        <input type="password" name="password2" required/>
      </p>

      <p>
        <input type="submit" value="Luo tunnus"/>
      </p>
    </form>

    <span class="main-footer">
      <footer class="form-footer">
      </footer>
    </span>

  </body>
</html>
