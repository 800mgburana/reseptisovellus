<!DOCTYPE html>
<html>

  <head>
    <link rel="stylesheet" href="/static/main.css">
    <title>Rekisteröinti</title>
  </head>

  <body>

    <header class="form-header">
      <nav class="navigation-icons">
        <a class="navigation-icon" href="/" title="Kotisivuun">
            &#127968;
        </a>
        <a class="navigation-icon" href="/search" title="Haku">
          &#128269;
        </a>
        {% if session.user_id %}
            <a class="navigation-icon" href="/user/{{session.user_id}}" title="Käyttäjäsivuun">
                &#128100;
            </a>
            <a class="navigation-icon" href="/logout" title="Kirjaudu ulos">
                &#128694;
            </a>
            <a class="navigation-icon" href="/new" title="Uusi resepti">
                &#128221;
            </a>
        {% else %}
            <a class="navigation-icon" href="/login" title="Kirjaudu sisään">
                &#128100;
            </a>
        {% endif %}
        <a class="navigation-icon" href="/register" title="Luo tunnus">
            &#128587;
        </a>
      </nav>
      <h1 class="search-form-title">Rekisteröinti</h1>
    </header>

    <main>
      {% for message in get_flashed_messages() %}
        <span class="flash-message">
          <div class="form-flash-message">
            <em>
              {{ message }}
            </em>
          </div>
        </span>
      {% endfor %}

      <form class="registration-form" action="/register" method="post">
        <p>
          <label for="username">Tunnus:</label><br>
          <input type="text" name="username" value="{{ filled.username }}" maxlength="16" required/>
        </p>

        <p>
          <label for="password1">Salasana:</label><br>
          <input type="password" name="password1" required/>
        </p>

        <p>
          <label for="password2">Salasana uudestaan:</label><br>
          <input type="password" name="password2" required/>
        </p>

        {% if next_page %}
          <input type="hidden" name="next_page" value="{{next_page}}"/>
        {% else %}
          <input type="hidden" name="next_page" value="/"/>
        {% endif %}

        <p>
          <input type="submit" value="Luo tunnus"/>
        </p>
      </form>

      <p class="cancel-button">
        <a  href="{{next_page}}"><button>Peruuta</button></a>
      </p>
    </main>

    <span class="main-footer">
      <footer class="form-footer">
      </footer>
    </span>

  </body>
</html>
