<!DOCTYPE html>
<html>

<link rel="stylesheet" href="/static/main.css">

{% if session.user_id %}

<head>
  <title>Reseptin luominen</title>
</head>

<body>
  <form action="/send" method="post">

    <p>
      Otsikko: <br />
      <textarea name="title" rows="1" cols="40"></textarea>
    </p>

    <p>
      Ainesosat: <br />
      <textarea name="ingredients" rows="3" cols="40"></textarea>
    </p>

    <p>
      Ohjeet: <br />
      <textarea name="instructions" rows="3" cols="40"></textarea>
    </p>

    <p>
      <input type="submit" value="Lähetä" />
    </p>
    
  </form>
</body>

{% else %}

<p> sinun on <a href="login">kirjauduttava sisään</a>, jotta voit lisätä reseptejä.  </p>

{% endif %}

</html>
